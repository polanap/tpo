plugins {
    id 'java'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

test {
    useJUnitPlatform()

    testLogging {
        events "failed"
        exceptionFormat "short"
    }

    afterTest { desc, result ->
        if (result.resultType.toString() == "SUCCESS") {
            println "[OK] ${desc.className} :: ${desc.displayName}"
        } else if (result.resultType.toString() == "FAILURE") {
            println "[FAILED] ${desc.className} :: ${desc.displayName}"
        }
    }

    afterSuite { desc, result ->
        if (!desc.parent) {
            println "Итог: ${result.testCount} тестов, " +
                    "${result.successfulTestCount} успешных, " +
                    "${result.failedTestCount} упало, " +
                    "${result.skippedTestCount} пропущено"
        }
    }
}
